<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../code/icon/ebco-logo-32px.png" sizes="32x32">
    <title>360 View</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #444;
        }

        .page {
            width: min(1200px, calc(100% - 40px));
            margin: 25px auto;
            padding: 35px;
            border-radius: 22px;
            background: url('../code/icon/brand-element-right-bottom.png') no-repeat right bottom 0 / 50% auto, linear-gradient(180deg, #deceb1 0%, #ffffff 100%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, .30);
        }

        h1 {
            text-align: center;
            font-size: 48px;
            font-weight: 400;
            margin-bottom: 35px;
            color: #111;
        }

        .floor {
            margin-bottom: 35px;
        }

        .floor-title {
            text-align: center;
            font-size: 22px;
            margin-bottom: 18px;
            font-weight: 400;
        }

        .views {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin: 0 auto;
        }

        .view-button {
            width: 145px;
            height: 62px;
            background: #fff;
            border-radius: 15px;
            text-decoration: none;
            color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            box-shadow: 0 10px 18px rgba(0, 0, 0, .18);
            transition: .18s;
        }

        .view-button:hover {
            transform: translateY(4px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, .14);
        }

        .view-button:active {
            transform: translateY(6px);
        }

        .credit {
            text-align: right;
            margin-top: 20px;
            font-size: 10px;
            color: rgba(244, 244, 244, 0.25);
        }

        .credit a {
            color: inherit;
            text-decoration: none;
        }

        .credit a:hover {
            color: #000;
        }

        /* Tablet */

        @media(max-width:900px) {
            h1 {
                font-size: 38px;
            }

            .page {
                padding: 25px;
            }

            .view-button {
                width: 135px;
                height: 58px;
            }

        }

        /* Mobile */

        @media(max-width:600px) {
            .page {
                width: calc(100% - 20px);
                padding: 20px;
            }

            h1 {
                font-size: 32px;
            }

            .floor-title {
                font-size: 20px;
            }

            .view-button {
                width: 130px;
                height: 56px;
                font-size: 15px;
            }

        }
    </style>

</head>

<body>

    <div class="page">

        <h1 style="display: none;">Sai Aditya</h1>
        <span style="visibility: hidden;">.</span>

        <div class="floor">
            <div class="floor-title">First Floor</div>
            <div class="views">
                <a href="/360/first-floor-view-01.html" class="view-button" target="_blank">View 01</a>
                <a href="/first-floor-view-02.html" class="view-button" target="_blank">View 02</a>
                <a href="/first-floor-view-03.html" class="view-button" target="_blank">View 03</a>
                <a href="/first-floor-view-04.html" class="view-button" target="_blank">View 04</a>
                <a href="/first-floor-view-05.html" class="view-button" target="_blank">View 05</a>
                <a href="/first-floor-view-06.html" class="view-button" target="_blank">View 06</a>
                <a href="/first-floor-view-07.html" class="view-button" target="_blank">View 07</a>
                <a href="/first-floor-view-08.html" class="view-button" target="_blank">View 08</a>
                <a href="/first-floor-view-09.html" class="view-button" target="_blank">View 09</a>
            </div>
        </div>

        <div class="floor">
            <div class="floor-title">Second Floor</div>
            <div class="views">
                <a href="/second-floor-view-01.html" class="view-button" target="_blank">View 01</a>
                <a href="/second-floor-view-02.html" class="view-button" target="_blank">View 02</a>
                <a href="/second-floor-view-03.html" class="view-button" target="_blank">View 03</a>
                <a href="/second-floor-view-04.html" class="view-button" target="_blank">View 04</a>
                <a href="/second-floor-view-05.html" class="view-button" target="_blank">View 05</a>
                <a href="/second-floor-view-06.html" class="view-button" target="_blank">View 06</a>
            </div>
        </div>

        <div class="credit">developed by <a href="https://wa.me/918793717577" target="_blank">The Stack Solutions</a></div>

    </div>

    <script>
        function updateRows() {
            const gap = 16;
            const buttonWidth = 145;

            document.querySelectorAll('.views').forEach(container => {
                const available = container.parentElement.clientWidth;
                let columns = Math.floor((available + gap) / (buttonWidth + gap));
                columns = Math.max(1, Math.min(columns, 5));
                const width = columns * buttonWidth + (columns - 1) * gap;
                container.style.width = width + "px";
            });
        }

        window.addEventListener("resize", updateRows);
        window.addEventListener("load", updateRows);
    </script>

</body>

</html>
